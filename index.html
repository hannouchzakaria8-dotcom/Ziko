<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>XcT Manager | لوحة تحكم البوتات</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #0a0a0a;
            color: #eef2ff;
            height: 100vh;
            overflow: hidden;
        }

        :root {
            --primary: #e53935;
            --primary-dark: #b71c1c;
            --primary-light: #ff5e5e;
            --bg-sidebar: #0f0f0f;
            --bg-main: #171717;
            --bg-header: #080808;
            --border: #262626;
            --msg-user: #2c2c2c;
            --msg-bot: #1e2a2e;
            --hover: #202020;
        }

        #lockScreen {
            position: fixed;
            inset: 0;
            background: radial-gradient(ellipse at 30% 40%, #1a0505, #000);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .lock-card {
            background: rgba(10, 10, 10, 0.9);
            backdrop-filter: blur(10px);
            padding: 2rem;
            border-radius: 2rem;
            text-align: center;
            border: 1px solid rgba(229, 57, 53, 0.4);
            width: 90%;
            max-width: 360px;
        }

        .lock-title {
            font-size: 2rem;
            font-weight: 800;
            background: linear-gradient(135deg, #ff6b6b, #b71c1c);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        #passwordInput {
            background: #1e1e1e;
            border: 1px solid #333;
            padding: 14px 20px;
            border-radius: 40px;
            color: white;
            width: 100%;
            margin: 20px 0;
        }

        button {
            background: var(--primary);
            border: none;
            color: white;
            padding: 10px 20px;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }

        button:hover {
            background: var(--primary-dark);
            transform: scale(0.97);
        }

        #appContainer {
            display: none;
            height: 100vh;
            flex-direction: column;
            background: var(--bg-main);
        }

        .topbar {
            background: var(--bg-header);
            padding: 12px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            border-bottom: 1px solid var(--border);
        }

        .menu-btn, .back-btn {
            background: transparent;
            font-size: 1.5rem;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .menu-btn:hover, .back-btn:hover {
            background: var(--hover);
            transform: none;
        }

        .topbar h2 {
            flex: 1;
            font-size: 1.3rem;
        }

        .main-layout {
            display: flex;
            flex: 1;
            overflow: hidden;
            position: relative;
        }

        .sidebar {
            width: 280px;
            background: var(--bg-sidebar);
            border-left: 1px solid var(--border);
            padding: 20px;
            transition: width 0.2s;
            overflow-x: hidden;
            white-space: nowrap;
        }

        .sidebar.hidden {
            width: 0;
            padding: 0;
        }

        .bot-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            background: #141414;
            border-radius: 18px;
            margin-bottom: 10px;
            cursor: pointer;
        }

        .bot-item:hover {
            background: #202020;
        }

        .bot-item img {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            object-fit: cover;
        }

        .add-bot-btn {
            width: 100%;
            margin-top: 12px;
            background: #1f1f1f;
            color: var(--primary);
            border: 1px solid var(--primary);
        }

        .chat-list {
            width: 340px;
            background: var(--bg-main);
            border-left: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }

        .chat-list-header {
            padding: 16px 20px;
            position: sticky;
            top: 0;
            background: var(--bg-main);
        }

        .search-box {
            background: #1e1e1e;
            border: none;
            padding: 12px 16px;
            border-radius: 30px;
            color: white;
            width: 100%;
            margin-bottom: 12px;
        }

        .chat-item {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 12px 20px;
            cursor: pointer;
            border-bottom: 1px solid var(--border);
        }

        .chat-item:hover {
            background: #202020;
        }

        .chat-item .avatar {
            width: 54px;
            height: 54px;
            border-radius: 50%;
            background: var(--primary);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.4rem;
            overflow: hidden;
        }

        .chat-info {
            flex: 1;
        }

        .chat-name {
            font-weight: 600;
        }

        .chat-type {
            font-size: 0.7rem;
            background: #2a2a2a;
            padding: 2px 8px;
            border-radius: 30px;
        }

        .last-msg {
            font-size: 0.8rem;
            color: #aaa;
        }

        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--bg-main);
        }

        .chat-header {
            padding: 12px 20px;
            background: var(--bg-header);
            display: flex;
            align-items: center;
            gap: 12px;
            border-bottom: 1px solid var(--border);
        }

        .chat-header .avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: var(--primary);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .bot-settings-btn {
            background: transparent;
            font-size: 1.2rem;
            margin-right: auto;
            width: 40px;
            height: 40px;
            border-radius: 50%;
        }

        .messages {
            flex: 1;
            padding: 20px 16px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .msg {
            max-width: 80%;
            padding: 10px 14px;
            border-radius: 22px;
            cursor: pointer;
            animation: fadeIn 0.2s;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .msg.user {
            background: var(--msg-user);
            align-self: flex-start;
            border-left: 3px solid var(--primary);
        }

        .msg.bot {
            background: var(--msg-bot);
            align-self: flex-end;
            border-right: 3px solid var(--primary-light);
        }

        .msg .sender {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.7rem;
            color: #bbb;
            margin-bottom: 6px;
        }

        .msg .sender img {
            width: 20px;
            height: 20px;
            border-radius: 50%;
        }

        .msg img, .msg video {
            max-width: 100%;
            border-radius: 12px;
            max-height: 200px;
        }

        .reply-preview {
            background: #2a2a2a;
            padding: 8px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            margin-bottom: 8px;
            border-right: 3px solid var(--primary);
            display: flex;
            justify-content: space-between;
        }

        .cancel-reply-btn {
            background: #444;
            padding: 2px 10px;
            border-radius: 20px;
            cursor: pointer;
        }

        .input-area {
            padding: 12px 16px;
            background: var(--bg-header);
            border-top: 1px solid var(--border);
        }

        .input-row {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .input-area input {
            flex: 1;
            background: #1e1e1e;
            border: none;
            padding: 12px 16px;
            border-radius: 30px;
            color: white;
        }

        .attach-btn, .send-btn {
            background: transparent;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            font-size: 1.3rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .send-btn {
            background: var(--primary);
        }

        .context-menu {
            position: fixed;
            background: #1e1e1e;
            border-radius: 16px;
            box-shadow: 0 4px 12px black;
            z-index: 3000;
            min-width: 150px;
            border: 1px solid #333;
        }

        .context-menu-item {
            padding: 10px 14px;
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
        }

        .context-menu-item:hover {
            background: #2a2a2a;
        }

        .context-menu-item.danger {
            color: var(--primary);
        }

        .modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.8);
            align-items: center;
            justify-content: center;
            z-index: 2000;
        }

        .modal-content {
            background: #1a1a1a;
            padding: 20px;
            border-radius: 28px;
            width: 90%;
            max-width: 400px;
        }

        .reaction-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 12px;
            margin: 20px 0;
        }

        .reaction-emoji {
            font-size: 2rem;
            background: #2a2a2a;
            border-radius: 40px;
            padding: 8px;
            text-align: center;
            cursor: pointer;
        }

        @media (max-width: 768px) {
            .sidebar {
                position: absolute;
                height: 100%;
                z-index: 30;
            }
            .sidebar.hidden {
                width: 0;
            }
            .chat-list {
                width: 100%;
                position: absolute;
            }
            .chat-area {
                width: 100%;
            }
            .msg {
                max-width: 85%;
            }
        }
    </style>
</head>
<body>

<div id="lockScreen">
    <div class="lock-card">
        <div class="lock-title">XcT MANAGER</div>
        <input type="password" id="passwordInput" placeholder="كلمة المرور">
        <button onclick="checkPassword()">دخول</button>
        <p id="lockStatus" style="color: var(--primary); margin-top: 12px;"></p>
    </div>
</div>

<div id="appContainer">
    <div class="topbar">
        <button class="menu-btn" onclick="toggleSidebar()"><i class="fas fa-bars"></i></button>
        <h2>XcT</h2>
        <button class="back-btn" id="globalBackBtn" onclick="closeCurrentChat()" style="display:none;"><i class="fas fa-arrow-right"></i></button>
    </div>
    <div class="main-layout">
        <div class="sidebar" id="sidebar">
            <h3><i class="fas fa-robot"></i> بوتاتي</h3>
            <button class="add-bot-btn" onclick="showAddBot()"><i class="fas fa-plus"></i> إضافة بوت</button>
            <hr>
            <div id="botList"></div>
        </div>
        <div class="chat-list" id="chatListPanel">
            <div class="chat-list-header">
                <h3><i class="fas fa-comments"></i> المحادثات</h3>
                <input type="text" class="search-box" id="searchChatInput" placeholder="إيدي مجموعة أو مستخدم">
                <button onclick="joinChatById()" style="width:100%;">انضمام</button>
            </div>
            <div id="chatList"></div>
        </div>
        <div class="chat-area" id="chatArea" style="display: none;"></div>
    </div>
</div>

<div class="modal" id="addBotModal">
    <div class="modal-content">
        <h3>➕ بوت جديد</h3>
        <input type="text" id="newBotToken" placeholder="التوكن">
        <button onclick="addBot()">إضافة</button>
        <button onclick="closeAddBot()" style="background:#333;">إلغاء</button>
    </div>
</div>

<div class="modal" id="reactionsModal">
    <div class="modal-content">
        <h3>اختر تفاعلاً</h3>
        <div id="reactionsGrid" class="reaction-grid"></div>
        <button onclick="closeReactionModal()">إلغاء</button>
    </div>
</div>

<div class="modal" id="settingsModal">
    <div class="modal-content" id="settingsContent"></div>
</div>

<script>
    const API_BASE = "https://xct-manager.up.railway.app";  // تأكد من صحة الرابط
    let currentToken = null;
    let currentChatId = null;
    let selectedMessageId = null;
    let ws = null;
    let currentReplyTo = null;

    const REACTIONS = ["👍","👎","❤️","🔥","😂","🤣","😈","💩","💔","🍆","🥰","👏","😁","🤔","🤯","😱","🎉","🤩","😢","😭","😡","💪","🙏","💯","⚡","⭐","😍","😎","🥺","🤨"];

    async function apiCall(endpoint, options = {}) {
        const response = await fetch(`${API_BASE}${endpoint}`, options);
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        return await response.json();
    }

    async function checkPassword() {
        const pw = document.getElementById("passwordInput").value;
        try {
            await apiCall("/check_password", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ password: pw })
            });
            document.getElementById("lockScreen").style.display = "none";
            document.getElementById("appContainer").style.display = "flex";
            loadBots();
        } catch (error) {
            document.getElementById("lockStatus").innerText = "❌ كلمة مرور خاطئة أو الخادم لا يعمل";
        }
    }

    function toggleSidebar() {
        document.getElementById("sidebar").classList.toggle("hidden");
    }

    function showAddBot() { document.getElementById("addBotModal").style.display = "flex"; }
    function closeAddBot() { document.getElementById("addBotModal").style.display = "none"; }
    function closeReactionModal() { document.getElementById("reactionsModal").style.display = "none"; }

    async function addBot() {
        const token = document.getElementById("newBotToken").value.trim();
        if (!token) return alert("أدخل التوكن");
        try {
            await apiCall("/add_bot", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ token })
            });
            alert("تمت إضافة البوت");
            closeAddBot();
            loadBots();
        } catch (error) {
            alert("توكن غير صالح");
        }
    }

    async function loadBots() {
        const data = await apiCall("/get_bots");
        let html = "";
        for (const bot of data.bots) {
            html += `
                <div class="bot-item" onclick="selectBot('${bot.token}')">
                    <img src="${bot.photo_url || 'https://via.placeholder.com/48'}" onerror="this.src='https://via.placeholder.com/48'">
                    <div>
                        <div>${bot.name || bot.username}</div>
                        <small>@${bot.username}</small>
                    </div>
                </div>
            `;
        }
        document.getElementById("botList").innerHTML = html || "<p>لا توجد بوتات</p>";
    }

    async function selectBot(token) {
        currentToken = token;
        currentChatId = null;
        if (ws) ws.close();
        document.getElementById("sidebar").classList.add("hidden");
        document.getElementById("chatListPanel").style.display = "flex";
        document.getElementById("chatArea").style.display = "none";
        document.getElementById("globalBackBtn").style.display = "none";
        await loadChats();
    }

    async function loadChats() {
        if (!currentToken) return;
        const data = await apiCall(`/get_chats?token=${currentToken}`);
        const container = document.getElementById("chatList");
        container.innerHTML = "";
        for (const chat of data.chats) {
            let typeText = chat.type === "group" ? "👥" : (chat.type === "channel" ? "📢" : "👤");
            const div = document.createElement("div");
            div.className = "chat-item";
            div.onclick = () => openChat(chat.id);
            div.innerHTML = `
                <div class="avatar">${chat.photo ? `<img src="${chat.photo}">` : `<span>${chat.title.charAt(0)}</span>`}</div>
                <div class="chat-info">
                    <div><span class="chat-name">${chat.title}</span> <span class="chat-type">${typeText}</span></div>
                    <div class="last-msg">${chat.last_message || "..."}</div>
                </div>
            `;
            container.appendChild(div);
        }
    }

    async function openChat(chatId) {
        currentChatId = chatId;
        if (window.innerWidth <= 768) {
            document.getElementById("chatListPanel").style.display = "none";
        } else {
            document.getElementById("chatListPanel").style.display = "flex";
        }
        document.getElementById("chatArea").style.display = "flex";
        document.getElementById("globalBackBtn").style.display = (window.innerWidth <= 768) ? "block" : "none";

        const data = await apiCall(`/get_messages/${chatId}?token=${currentToken}&limit=50`);
        const info = data.info;
        const typeIcon = info?.type === "group" ? "👥" : (info?.type === "channel" ? "📢" : "👤");

        const headerHtml = `
            <div class="chat-header">
                <div class="avatar">${info?.photo ? `<img src="${info.photo}">` : `<span>${info?.title?.charAt(0)}</span>`}</div>
                <div><strong>${info?.title}</strong><br><small>${typeIcon} ${info?.type || 'مستخدم'}</small></div>
                <button class="bot-settings-btn" onclick="openChatSettings()"><i class="fas fa-sliders-h"></i></button>
            </div>
        `;
        const messagesHtml = `<div class="messages" id="messages"></div>`;
        const inputHtml = `
            <div class="input-area">
                <div id="replyPreviewContainer"></div>
                <div class="input-row">
                    <input type="text" id="msgInput" placeholder="اكتب رسالة...">
                    <label class="attach-btn"><i class="fas fa-paperclip"></i><input type="file" id="mediaFile" style="display:none;" onchange="uploadMedia()"></label>
                    <button class="send-btn" onclick="sendMessage()"><i class="fas fa-paper-plane"></i></button>
                </div>
            </div>
        `;
        document.getElementById("chatArea").innerHTML = headerHtml + messagesHtml + inputHtml;
        renderMessages(data.messages);
        connectWebSocket();
        resetReplyPreview();
    }

    function renderMessages(messages) {
        const container = document.getElementById("messages");
        if (!container) return;
        container.innerHTML = "";
        for (const msg of messages) {
            container.appendChild(createMessageElement(msg));
        }
        container.scrollTop = container.scrollHeight;
    }

    function createMessageElement(msg) {
        const div = document.createElement("div");
        div.className = `msg ${msg.from === "user" ? "user" : "bot"}`;
        const senderHtml = `
            <div class="sender">
                ${msg.sender_photo ? `<img src="${msg.sender_photo}">` : `<span>${msg.sender_name?.charAt(0)}</span>`}
                <span>${msg.sender_name}</span>
            </div>
        `;
        let mediaHtml = "";
        if (msg.media_url) {
            if (msg.media_type === "photo") mediaHtml = `<img src="${msg.media_url}">`;
            else if (msg.media_type === "video") mediaHtml = `<video controls src="${msg.media_url}"></video>`;
            else if (msg.media_type === "sticker") mediaHtml = `<img src="${msg.media_url}" style="max-width:120px;">`;
            else mediaHtml = `<a href="${msg.media_url}" target="_blank">📎 ملف</a>`;
        }
        div.innerHTML = senderHtml + (msg.text || "") + mediaHtml;
        div.setAttribute("data-msg-id", msg.message_id);

        let pressTimer;
        div.addEventListener("mousedown", (e) => { pressTimer = setTimeout(() => showContextMenu(e, msg), 500); });
        div.addEventListener("mouseup", () => clearTimeout(pressTimer));
        div.addEventListener("contextmenu", (e) => { e.preventDefault(); showContextMenu(e, msg); return false; });
        div.addEventListener("touchstart", (e) => { pressTimer = setTimeout(() => showContextMenu(e, msg), 500); });
        div.addEventListener("touchend", () => clearTimeout(pressTimer));
        div.addEventListener("touchmove", () => clearTimeout(pressTimer));
        return div;
    }

    function showContextMenu(event, msg) {
        event.preventDefault();
        const existing = document.querySelector(".context-menu");
        if (existing) existing.remove();

        const menu = document.createElement("div");
        menu.className = "context-menu";
        menu.style.top = `${event.clientY}px`;
        menu.style.left = `${event.clientX}px`;
        menu.innerHTML = `
            <div class="context-menu-item" data-action="pin"><i class="fas fa-thumbtack"></i> تثبيت</div>
            <div class="context-menu-item" data-action="delete"><i class="fas fa-trash-alt"></i> حذف</div>
            <div class="context-menu-item" data-action="react"><i class="far fa-smile-wink"></i> تفاعل</div>
            <div class="context-menu-item" data-action="reply"><i class="fas fa-reply"></i> رد</div>
            <div class="context-menu-item" data-action="mute"><i class="fas fa-microphone-slash"></i> كتم</div>
            <div class="context-menu-item danger" data-action="block"><i class="fas fa-ban"></i> حظر</div>
        `;
        document.body.appendChild(menu);

        const rect = menu.getBoundingClientRect();
        if (rect.right > window.innerWidth) menu.style.left = `${window.innerWidth - rect.width - 10}px`;
        if (rect.bottom > window.innerHeight) menu.style.top = `${window.innerHeight - rect.height - 10}px`;

        menu.querySelectorAll("[data-action]").forEach(item => {
            item.addEventListener("click", async () => {
                const action = item.getAttribute("data-action");
                menu.remove();
                switch (action) {
                    case "pin": await pinMessage(msg.message_id); break;
                    case "delete": await deleteMessage(msg.message_id); break;
                    case "react": openReactionPicker(msg.message_id); break;
                    case "reply": setReply(msg); break;
                    case "mute": await muteUser(); break;
                    case "block": await blockUser(); break;
                }
            });
        });

        setTimeout(() => {
            document.addEventListener("click", function closeMenu(e) {
                if (!menu.contains(e.target)) { menu.remove(); document.removeEventListener("click", closeMenu); }
            });
        }, 10);
    }

    async function pinMessage(msgId) {
        try {
            await apiCall("/pin_message", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ token: currentToken, chat_id: currentChatId, message_id: msgId }) });
            alert("تم التثبيت");
        } catch (e) { alert("غير مدعوم"); }
    }
    async function deleteMessage(msgId) {
        try {
            await apiCall("/delete_message", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ token: currentToken, chat_id: currentChatId, message_id: msgId }) });
            alert("تم الحذف");
        } catch (e) { alert("غير مدعوم"); }
    }
    async function muteUser() {
        const uid = prompt("معرف المستخدم:");
        if (!uid) return;
        try {
            await apiCall("/restrict_user", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ token: currentToken, chat_id: currentChatId, user_id: parseInt(uid), until_date: 2147483647 }) });
            alert("تم الكتم");
        } catch (e) { alert("غير مدعوم"); }
    }
    async function blockUser() {
        const uid = prompt("معرف المستخدم:");
        if (!uid) return;
        try {
            await apiCall("/ban_user", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ token: currentToken, chat_id: currentChatId, user_id: parseInt(uid) }) });
            alert("تم الحظر");
        } catch (e) { alert("غير مدعوم"); }
    }

    function setReply(msg) {
        currentReplyTo = msg;
        updateReplyPreview();
    }
    function updateReplyPreview() {
        const container = document.getElementById("replyPreviewContainer");
        if (!container) return;
        if (currentReplyTo) {
            container.innerHTML = `<div class="reply-preview"><div><strong>↩️ رد على ${currentReplyTo.sender_name}:</strong> ${currentReplyTo.text?.substring(0, 50) || ""}</div><div class="cancel-reply-btn" onclick="resetReplyPreview()">إلغاء</div></div>`;
        } else {
            container.innerHTML = "";
        }
    }
    function resetReplyPreview() {
        currentReplyTo = null;
        updateReplyPreview();
    }

    async function sendMessage() {
        const input = document.getElementById("msgInput");
        const text = input.value.trim();
        if (!text) return;
        const payload = { token: currentToken, chat_id: currentChatId, text: text };
        if (currentReplyTo) payload.reply_to_message_id = currentReplyTo.message_id;
        await apiCall("/send_message", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(payload) });
        input.value = "";
        resetReplyPreview();
        const container = document.getElementById("messages");
        const temp = document.createElement("div");
        temp.className = "msg user";
        temp.innerHTML = `<div class="sender"><span>أنت</span></div>${text}`;
        container.appendChild(temp);
        container.scrollTop = container.scrollHeight;
    }

    async function uploadMedia() {
        const file = document.getElementById("mediaFile").files[0];
        if (!file) return;
        const formData = new FormData();
        formData.append("token", currentToken);
        formData.append("chat_id", currentChatId);
        let endpoint = "/send_document";
        if (file.type.startsWith("image/")) endpoint = "/send_photo";
        else if (file.type.startsWith("video/")) endpoint = "/send_video";
        const fileField = endpoint === "/send_photo" ? "photo" : (endpoint === "/send_video" ? "video" : "document");
        formData.append(fileField, file);
        await fetch(`${API_BASE}${endpoint}`, { method: "POST", body: formData });
        document.getElementById("mediaFile").value = "";
    }

    function openReactionPicker(msgId) {
        selectedMessageId = msgId;
        const grid = document.getElementById("reactionsGrid");
        grid.innerHTML = REACTIONS.map(e => `<div class="reaction-emoji" onclick="sendReaction('${e}')">${e}</div>`).join("");
        document.getElementById("reactionsModal").style.display = "flex";
    }
    async function sendReaction(emoji) {
        if (!selectedMessageId) return;
        await apiCall("/send_reaction", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ token: currentToken, chat_id: currentChatId, message_id: parseInt(selectedMessageId), emoji }) });
        closeReactionModal();
    }

    function connectWebSocket() {
        if (ws) ws.close();
        const wsProtocol = API_BASE.startsWith("https") ? "wss" : "ws";
        const wsUrl = `${wsProtocol}://${API_BASE.replace(/^https?:\/\//, "")}/ws/${currentToken}/${currentChatId}`;
        ws = new WebSocket(wsUrl);
        ws.onmessage = (e) => {
            const data = JSON.parse(e.data);
            if (data.type === "new_message") {
                const container = document.getElementById("messages");
                if (container) {
                    container.appendChild(createMessageElement(data.message));
                    container.scrollTop = container.scrollHeight;
                }
            }
        };
        ws.onclose = () => setTimeout(connectWebSocket, 3000);
    }

    function closeCurrentChat() {
        if (ws) ws.close();
        currentChatId = null;
        document.getElementById("chatArea").style.display = "none";
        document.getElementById("chatListPanel").style.display = "flex";
        document.getElementById("globalBackBtn").style.display = "none";
        loadChats();
    }

    async function joinChatById() {
        const id = document.getElementById("searchChatInput").value.trim();
        if (!id || !currentToken) return;
        await apiCall("/join_chat", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ token: currentToken, chat_id: id }) });
        loadChats();
    }

    async function openChatSettings() {
        const data = await apiCall("/get_bots");
        const bot = data.bots.find(b => b.token === currentToken) || {};
        const content = `
            <h3>⚙️ إعدادات ${bot.name || bot.username}</h3>
            <div><label>الاسم:</label><input type="text" id="newBotName" value="${bot.name || ''}"></div>
            <button onclick="setBotName()">تحديث الاسم</button>
            <div><label>الوصف:</label><input type="text" id="newBotDesc"></div>
            <button onclick="setBotDesc()">تحديث الوصف</button>
            <div><label>صورة جديدة:</label><input type="file" id="newBotPhoto" accept="image/*"></div>
            <button onclick="setBotPhoto()">رفع الصورة</button>
            <hr>
            <button onclick="logoutBot()" style="background:#333; border:1px solid var(--primary);">🚪 تسجيل الخروج (حذف البوت)</button>
            <button onclick="closeSettingsModal()" style="background:#333;">إغلاق</button>
        `;
        document.getElementById("settingsContent").innerHTML = content;
        document.getElementById("settingsModal").style.display = "flex";
    }
    async function setBotName() { const name = document.getElementById("newBotName").value; await apiCall("/set_bot_name", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ token: currentToken, name }) }); alert("تم"); }
    async function setBotDesc() { const desc = document.getElementById("newBotDesc").value; await apiCall("/set_bot_description", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ token: currentToken, description: desc }) }); alert("تم"); }
    async function setBotPhoto() {
        const file = document.getElementById("newBotPhoto").files[0];
        if (!file) return;
        const fd = new FormData();
        fd.append("token", currentToken);
        fd.append("photo", file);
        await fetch(`${API_BASE}/set_bot_photo`, { method: "POST", body: fd });
        alert("تم");
        loadBots();
    }
    async function logoutBot() {
        if (!confirm("تسجيل الخروج سيحذف البوت نهائياً؟")) return;
        await apiCall("/delete_bot", { method: "DELETE", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ token: currentToken }) });
        alert("تم تسجيل الخروج");
        closeSettingsModal();
        if (ws) ws.close();
        currentToken = null;
        currentChatId = null;
        document.getElementById("chatArea").style.display = "none";
        document.getElementById("chatListPanel").style.display = "flex";
        document.getElementById("globalBackBtn").style.display = "none";
        loadBots();
    }
    function closeSettingsModal() { document.getElementById("settingsModal").style.display = "none"; }

    setInterval(() => {
        if (currentChatId && document.getElementById("chatArea").style.display === "flex") {
            apiCall(`/get_messages/${currentChatId}?token=${currentToken}&limit=50`).then(data => renderMessages(data.messages)).catch(console.error);
        }
    }, 8000);
</script>
</body>
</html>
