<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>XcT Manager | لوحة تحكم متكاملة</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #0a0a0a;
            color: #eef2ff;
            height: 100vh;
            overflow: hidden;
        }

        :root {
            --primary: #e53935;
            --primary-dark: #b71c1c;
            --primary-light: #ff5e5e;
            --bg-sidebar: #0f0f0f;
            --bg-main: #171717;
            --bg-header: #080808;
            --border: #262626;
            --msg-user: #2c2c2c;
            --msg-bot: #1e2a2e;
            --hover: #202020;
            --shadow-sm: 0 2px 8px rgba(0,0,0,0.3);
            --shadow-md: 0 4px 12px rgba(0,0,0,0.4);
        }

        /* Lock Screen */
        #lockScreen {
            position: fixed;
            inset: 0;
            background: radial-gradient(ellipse at 30% 40%, #1a0505, #000);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            backdrop-filter: blur(4px);
        }

        .lock-card {
            background: rgba(10,10,10,0.9);
            backdrop-filter: blur(10px);
            padding: 2rem;
            border-radius: 2rem;
            text-align: center;
            border: 1px solid rgba(229,57,53,0.4);
            box-shadow: 0 0 40px rgba(229,57,53,0.2);
            width: 90%;
            max-width: 360px;
        }

        .lock-title {
            font-size: 2rem;
            font-weight: 800;
            background: linear-gradient(135deg, #ff6b6b, #b71c1c);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 0.5rem;
        }

        #passwordInput {
            background: #1e1e1e;
            border: 1px solid #333;
            padding: 14px 20px;
            border-radius: 40px;
            color: white;
            width: 100%;
            margin: 20px 0;
            font-size: 1rem;
        }

        button {
            background: var(--primary);
            border: none;
            color: white;
            padding: 10px 20px;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            font-family: inherit;
        }

        button:hover {
            background: var(--primary-dark);
            transform: scale(0.97);
        }

        /* Main App Container */
        #appContainer {
            display: none;
            height: 100vh;
            flex-direction: column;
            background: var(--bg-main);
        }

        .topbar {
            background: var(--bg-header);
            padding: 12px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            border-bottom: 1px solid var(--border);
            box-shadow: var(--shadow-sm);
            z-index: 10;
        }

        .menu-btn, .back-btn {
            background: transparent;
            font-size: 1.5rem;
            width: 44px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
        }

        .menu-btn:hover, .back-btn:hover {
            background: var(--hover);
            transform: none;
        }

        .topbar h2 {
            flex: 1;
            font-size: 1.3rem;
            font-weight: 600;
            letter-spacing: -0.3px;
        }

        .main-layout {
            display: flex;
            flex: 1;
            overflow: hidden;
            position: relative;
        }

        /* Sidebar (Bots) */
        .sidebar {
            width: 280px;
            background: var(--bg-sidebar);
            border-left: 1px solid var(--border);
            padding: 20px;
            transition: width 0.2s ease-in-out, padding 0.2s, opacity 0.2s;
            overflow-x: hidden;
            white-space: nowrap;
            opacity: 1;
            z-index: 20;
        }

        .sidebar.hidden {
            width: 0;
            padding: 0;
            opacity: 0;
            visibility: hidden;
        }

        .bot-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            background: #141414;
            border-radius: 18px;
            margin-bottom: 10px;
            cursor: pointer;
            transition: 0.1s;
        }

        .bot-item:hover {
            background: #202020;
            transform: translateX(-4px);
        }

        .bot-item img {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            object-fit: cover;
            border: 1px solid #333;
        }

        .add-bot-btn {
            width: 100%;
            margin-top: 12px;
            background: #1f1f1f;
            color: var(--primary);
            border: 1px solid var(--primary);
        }

        .add-bot-btn:hover {
            background: var(--primary);
            color: white;
        }

        /* Chat List (Chats) */
        .chat-list {
            width: 340px;
            background: var(--bg-main);
            border-left: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }

        .chat-list-header {
            padding: 16px 20px;
            position: sticky;
            top: 0;
            background: var(--bg-main);
            z-index: 5;
        }

        .search-box {
            background: #1e1e1e;
            border: none;
            padding: 12px 16px;
            border-radius: 30px;
            color: white;
            width: 100%;
            margin-bottom: 12px;
        }

        .chat-item {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 12px 20px;
            cursor: pointer;
            transition: 0.1s;
            border-bottom: 1px solid var(--border);
        }

        .chat-item:hover {
            background: #202020;
        }

        .chat-item .avatar {
            width: 54px;
            height: 54px;
            border-radius: 50%;
            background: var(--primary);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 1.4rem;
            overflow: hidden;
            flex-shrink: 0;
        }

        .chat-item .avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .chat-info {
            flex: 1;
            overflow: hidden;
        }

        .chat-title {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }

        .chat-name {
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .chat-type {
            font-size: 0.7rem;
            background: #2a2a2a;
            padding: 2px 8px;
            border-radius: 30px;
            white-space: nowrap;
        }

        .last-msg {
            font-size: 0.8rem;
            color: #aaa;
            margin-top: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* Chat Area */
        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--bg-main);
        }

        .chat-header {
            padding: 12px 20px;
            background: var(--bg-header);
            display: flex;
            align-items: center;
            gap: 12px;
            border-bottom: 1px solid var(--border);
        }

        .chat-header .avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: var(--primary);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            flex-shrink: 0;
        }

        .chat-header .avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .bot-settings-btn {
            background: transparent;
            font-size: 1.2rem;
            margin-right: auto;
            padding: 8px;
            width: auto;
            border: none;
            color: white;
            cursor: pointer;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .bot-settings-btn:hover {
            background: var(--hover);
        }

        /* Messages Container */
        .messages {
            flex: 1;
            padding: 20px 16px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
            background-image: radial-gradient(circle at 10% 20%, rgba(229,57,53,0.03) 2%, transparent 2.5%);
            background-size: 28px 28px;
        }

        /* Message Bubbles */
        .msg {
            max-width: 80%;
            padding: 10px 14px;
            border-radius: 22px;
            position: relative;
            word-break: break-word;
            animation: fadeInUp 0.2s ease;
            box-shadow: var(--shadow-sm);
            cursor: pointer;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(8px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .msg.user {
            background: var(--msg-user);
            align-self: flex-start;
            border-bottom-left-radius: 6px;
            border-left: 3px solid var(--primary);
        }

        .msg.bot {
            background: var(--msg-bot);
            align-self: flex-end;
            border-bottom-right-radius: 6px;
            border-right: 3px solid var(--primary-light);
        }

        .msg .sender {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.7rem;
            color: #bbb;
            margin-bottom: 6px;
        }

        .msg .sender img {
            width: 22px;
            height: 22px;
            border-radius: 50%;
            object-fit: cover;
        }

        .msg img, .msg video {
            max-width: 100%;
            border-radius: 16px;
            margin-top: 6px;
            max-height: 240px;
        }

        /* Reply Preview */
        .reply-preview {
            background: #2a2a2a;
            padding: 8px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            margin-bottom: 8px;
            border-right: 3px solid var(--primary);
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
            width: 100%;
        }

        .reply-preview .reply-content {
            flex: 1;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .cancel-reply-btn {
            background: #444;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.7rem;
            cursor: pointer;
            transition: 0.1s;
        }

        .cancel-reply-btn:hover {
            background: #555;
        }

        /* Input Area */
        .input-area {
            padding: 12px 16px;
            background: var(--bg-header);
            display: flex;
            flex-direction: column;
            gap: 8px;
            border-top: 1px solid var(--border);
        }

        .input-row {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .input-area input {
            flex: 1;
            background: #1e1e1e;
            border: none;
            padding: 12px 16px;
            border-radius: 30px;
            color: white;
            font-size: 1rem;
        }

        .attach-btn, .send-btn {
            background: transparent;
            width: 44px;
            height: 44px;
            padding: 0;
            border-radius: 50%;
            font-size: 1.3rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .send-btn {
            background: var(--primary);
        }

        .send-btn:hover {
            background: var(--primary-dark);
        }

        /* Context Menu */
        .context-menu {
            position: fixed;
            background: #1e1e1e;
            border-radius: 16px;
            box-shadow: var(--shadow-md);
            z-index: 3000;
            overflow: hidden;
            min-width: 160px;
            border: 1px solid #333;
        }

        .context-menu-item {
            padding: 12px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            transition: 0.1s;
            font-size: 0.9rem;
        }

        .context-menu-item:hover {
            background: #2a2a2a;
        }

        .context-menu-item.danger {
            color: var(--primary);
        }

        /* Modals */
        .modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(5px);
            align-items: center;
            justify-content: center;
            z-index: 2000;
        }

        .modal-content {
            background: #1a1a1a;
            padding: 20px;
            border-radius: 32px;
            width: 90%;
            max-width: 420px;
            max-height: 80vh;
            overflow-y: auto;
            border: 1px solid #333;
        }

        .reaction-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 12px;
            margin: 20px 0;
        }

        .reaction-emoji {
            font-size: 2rem;
            background: #2a2a2a;
            border-radius: 40px;
            padding: 8px;
            text-align: center;
            cursor: pointer;
            transition: 0.1s;
        }

        .reaction-emoji:hover {
            background: var(--primary);
            transform: scale(1.1);
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            .sidebar {
                position: absolute;
                top: 0;
                right: 0;
                height: 100%;
                z-index: 30;
                box-shadow: 0 0 20px black;
            }
            .sidebar.hidden {
                width: 0;
                padding: 0;
                visibility: hidden;
            }
            .chat-list {
                width: 100%;
                position: absolute;
                top: 0;
                right: 0;
                height: 100%;
                z-index: 15;
                background: var(--bg-main);
            }
            .chat-area {
                width: 100%;
                z-index: 20;
            }
            .msg {
                max-width: 85%;
            }
        }
    </style>
</head>
<body>

    <!-- Lock Screen -->
    <div id="lockScreen">
        <div class="lock-card">
            <div class="lock-title">XcT MANAGER</div>
            <p style="margin: 8px 0; opacity:0.7;">تحكم كامل ببوتات تيليجرام</p>
            <input type="password" id="passwordInput" placeholder="••••••">
            <button onclick="checkPassword()">دخول</button>
            <p id="lockStatus" style="color: var(--primary); margin-top: 12px;"></p>
        </div>
    </div>

    <!-- Main App -->
    <div id="appContainer">
        <div class="topbar">
            <button class="menu-btn" onclick="toggleSidebar()"><i class="fas fa-bars"></i></button>
            <h2>XcT</h2>
            <button class="back-btn" id="globalBackBtn" onclick="closeCurrentChat()" style="display:none;"><i class="fas fa-arrow-right"></i></button>
        </div>
        <div class="main-layout">
            <!-- Sidebar -->
            <div class="sidebar" id="sidebar">
                <h3><i class="fas fa-robot"></i> بوتاتي</h3>
                <button class="add-bot-btn" onclick="showAddBot()"><i class="fas fa-plus"></i> إضافة بوت</button>
                <hr style="margin: 16px 0; border-color:#2a2a2a;">
                <div id="botList"></div>
            </div>

            <!-- Chat List -->
            <div class="chat-list" id="chatListPanel">
                <div class="chat-list-header">
                    <h3><i class="fas fa-comments"></i> المحادثات</h3>
                    <input type="text" class="search-box" id="searchChatInput" placeholder="إيدي مجموعة أو مستخدم">
                    <button onclick="joinChatById()" style="width:100%; background:#1f1f1f; border:1px solid #444;">انضمام</button>
                </div>
                <div id="chatList"></div>
            </div>

            <!-- Chat Area -->
            <div class="chat-area" id="chatArea" style="display: none;"></div>
        </div>
    </div>

    <!-- Modals -->
    <div class="modal" id="addBotModal">
        <div class="modal-content">
            <h3>➕ بوت جديد</h3>
            <input type="text" id="newBotToken" placeholder="التوكن" style="width:100%; margin:10px 0; padding:12px; border-radius:30px;">
            <button onclick="addBot()" style="width:100%;">إضافة</button>
            <button onclick="closeAddBot()" style="background:#333; margin-top:8px;">إلغاء</button>
        </div>
    </div>

    <div class="modal" id="reactionsModal">
        <div class="modal-content">
            <h3>اختر تفاعلاً</h3>
            <div id="reactionsGrid" class="reaction-grid"></div>
            <button onclick="closeReactionModal()" style="background:#333;">إلغاء</button>
        </div>
    </div>

    <div class="modal" id="settingsModal">
        <div class="modal-content" id="settingsContent"></div>
    </div>

    <script>
        // ================== Configuration ==================
        // ⚠️ استبدل هذا الرابط برابط الخادم الخاص بك (احرص على عدم وجود slash في النهاية)
        const API_BASE = "https://xct-manager.up.railway.app";
        let currentToken = null;
        let currentChatId = null;
        let selectedMessageId = null;
        let ws = null;
        let currentReplyTo = null;

        const REACTIONS = [
            "👍", "👎", "❤️", "🔥", "😂", "🤣", "😈", "💩", "💔", "🍆",
            "🥰", "👏", "😁", "🤔", "🤯", "😱", "🎉", "🤩", "😢", "😭",
            "😡", "💪", "🙏", "💯", "⚡", "⭐", "😍", "😎", "🥺", "🤨"
        ];

        // ================== Helper Functions ==================
        async function apiCall(endpoint, options = {}) {
            try {
                const response = await fetch(`${API_BASE}${endpoint}`, options);
                if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
                return await response.json();
            } catch (error) {
                console.error(`API call failed: ${endpoint}`, error);
                throw error;
            }
        }

        // ================== Auth and Initial Load ==================
        async function checkPassword() {
            const pw = document.getElementById("passwordInput").value;
            try {
                await apiCall("/check_password", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ password: pw })
                });
                document.getElementById("lockScreen").style.display = "none";
                document.getElementById("appContainer").style.display = "flex";
                loadBots();
            } catch (error) {
                document.getElementById("lockStatus").innerText = "❌ كلمة مرور خاطئة";
            }
        }

        // ================== Bot Management ==================
        function toggleSidebar() {
            document.getElementById("sidebar").classList.toggle("hidden");
        }

        function showAddBot() {
            document.getElementById("addBotModal").style.display = "flex";
        }

        function closeAddBot() {
            document.getElementById("addBotModal").style.display = "none";
        }

        async function addBot() {
            const token = document.getElementById("newBotToken").value.trim();
            if (!token) return alert("أدخل التوكن");
            try {
                await apiCall("/add_bot", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ token })
                });
                alert("✅ تمت إضافة البوت");
                closeAddBot();
                loadBots();
            } catch (error) {
                alert("❌ توكن غير صالح");
            }
        }

        async function loadBots() {
            try {
                const data = await apiCall("/get_bots");
                let html = "";
                for (const bot of data.bots) {
                    html += `
                        <div class="bot-item" onclick="selectBot('${bot.token}')">
                            <img src="${bot.photo_url || 'https://via.placeholder.com/48'}" onerror="this.src='https://via.placeholder.com/48'">
                            <div>
                                <div>${bot.name || bot.username}</div>
                                <small>@${bot.username}</small>
                            </div>
                        </div>
                    `;
                }
                document.getElementById("botList").innerHTML = html || "<p style='text-align:center;'>لا توجد بوتات، أضف الأول</p>";
            } catch (error) {
                console.error("Failed to load bots", error);
            }
        }

        async function selectBot(token) {
            currentToken = token;
            currentChatId = null;
            if (ws) ws.close();
            document.getElementById("sidebar").classList.add("hidden");
            document.getElementById("chatListPanel").style.display = "flex";
            document.getElementById("chatArea").style.display = "none";
            document.getElementById("globalBackBtn").style.display = "none";
            await loadChats();
        }

        // ================== Chat List ==================
        async function loadChats() {
            if (!currentToken) return;
            try {
                const data = await apiCall(`/get_chats?token=${currentToken}`);
                const container = document.getElementById("chatList");
                container.innerHTML = "";
                for (const chat of data.chats) {
                    let typeText = chat.type === "group" ? "👥 مجموعة" : (chat.type === "channel" ? "📢 قناة" : "👤 مستخدم");
                    const div = document.createElement("div");
                    div.className = "chat-item";
                    div.onclick = () => openChat(chat.id);
                    div.innerHTML = `
                        <div class="avatar">
                            ${chat.photo ? `<img src="${chat.photo}">` : `<span>${chat.title.charAt(0)}</span>`}
                        </div>
                        <div class="chat-info">
                            <div class="chat-title">
                                <span class="chat-name">${chat.title}</span>
                                <span class="chat-type">${typeText}</span>
                            </div>
                            <div class="last-msg">${chat.last_message || "..."}</div>
                        </div>
                    `;
                    container.appendChild(div);
                }
            } catch (error) {
                console.error("Failed to load chats", error);
            }
        }

        // ================== Open Chat & Messages ==================
        async function openChat(chatId) {
            currentChatId = chatId;
            if (window.innerWidth <= 768) {
                document.getElementById("chatListPanel").style.display = "none";
            } else {
                document.getElementById("chatListPanel").style.display = "flex";
            }
            document.getElementById("chatArea").style.display = "flex";
            document.getElementById("globalBackBtn").style.display = (window.innerWidth <= 768) ? "block" : "none";

            try {
                // 🔥 التعديل الأهم: إضافة token إلى طلب get_messages
                const data = await apiCall(`/get_messages/${chatId}?token=${currentToken}&limit=50`);
                const info = data.info;
                const typeIcon = info?.type === "group" ? "👥" : (info?.type === "channel" ? "📢" : "👤");

                const headerHtml = `
                    <div class="chat-header">
                        <div class="avatar">
                            ${info?.photo ? `<img src="${info.photo}">` : `<span>${info?.title?.charAt(0)}</span>`}
                        </div>
                        <div>
                            <strong>${info?.title}</strong>
                            <br><small>${typeIcon} ${info?.type || 'مستخدم'}</small>
                        </div>
                        <button class="bot-settings-btn" onclick="openChatSettings()">
                            <i class="fas fa-sliders-h"></i>
                        </button>
                    </div>
                `;

                const messagesHtml = `<div class="messages" id="messages"></div>`;

                const inputHtml = `
                    <div class="input-area">
                        <div id="replyPreviewContainer"></div>
                        <div class="input-row">
                            <input type="text" id="msgInput" placeholder="اكتب رسالة...">
                            <label class="attach-btn">
                                <i class="fas fa-paperclip"></i>
                                <input type="file" id="mediaFile" style="display:none;" onchange="uploadMedia()">
                            </label>
                            <button class="send-btn" onclick="sendMessage()"><i class="fas fa-paper-plane"></i></button>
                        </div>
                    </div>
                `;

                document.getElementById("chatArea").innerHTML = headerHtml + messagesHtml + inputHtml;
                renderMessages(data.messages);
                connectWebSocket();
                resetReplyPreview();
            } catch (error) {
                console.error("Failed to open chat", error);
                alert("حدث خطأ أثناء فتح الدردشة. تأكد من أن الخادم يعمل.");
            }
        }

        function renderMessages(messages) {
            const container = document.getElementById("messages");
            if (!container) return;
            container.innerHTML = "";
            for (const msg of messages) {
                container.appendChild(createMessageElement(msg));
            }
            container.scrollTop = container.scrollHeight;
        }

        function createMessageElement(msg) {
            const div = document.createElement("div");
            div.className = `msg ${msg.from === "user" ? "user" : "bot"}`;

            const senderHtml = `
                <div class="sender">
                    ${msg.sender_photo ? `<img src="${msg.sender_photo}">` : `<span>${msg.sender_name?.charAt(0)}</span>`}
                    <span>${msg.sender_name}</span>
                </div>
            `;

            let mediaHtml = "";
            if (msg.media_url) {
                if (msg.media_type === "photo") mediaHtml = `<img src="${msg.media_url}">`;
                else if (msg.media_type === "video") mediaHtml = `<video controls src="${msg.media_url}"></video>`;
                else if (msg.media_type === "sticker") mediaHtml = `<img src="${msg.media_url}" style="max-width:120px;">`;
                else mediaHtml = `<a href="${msg.media_url}" target="_blank">📎 ملف</a>`;
            }

            div.innerHTML = senderHtml + (msg.text || "") + mediaHtml;
            div.setAttribute("data-msg-id", msg.message_id);
            div.setAttribute("data-sender", msg.sender_name);
            div.setAttribute("data-text", msg.text || "");

            let pressTimer;
            div.addEventListener("mousedown", (e) => {
                pressTimer = setTimeout(() => showContextMenu(e, msg), 500);
            });
            div.addEventListener("mouseup", () => clearTimeout(pressTimer));
            div.addEventListener("contextmenu", (e) => {
                e.preventDefault();
                showContextMenu(e, msg);
                return false;
            });
            div.addEventListener("touchstart", (e) => {
                pressTimer = setTimeout(() => showContextMenu(e, msg), 500);
            });
            div.addEventListener("touchend", () => clearTimeout(pressTimer));
            div.addEventListener("touchmove", () => clearTimeout(pressTimer));

            return div;
        }

        // ================== Context Menu ==================
        function showContextMenu(event, msg) {
            event.preventDefault();
            const existingMenu = document.querySelector(".context-menu");
            if (existingMenu) existingMenu.remove();

            const menu = document.createElement("div");
            menu.className = "context-menu";
            menu.style.top = `${event.clientY}px`;
            menu.style.left = `${event.clientX}px`;

            menu.innerHTML = `
                <div class="context-menu-item" data-action="pin"><i class="fas fa-thumbtack"></i> تثبيت</div>
                <div class="context-menu-item" data-action="delete"><i class="fas fa-trash-alt"></i> حذف</div>
                <div class="context-menu-item" data-action="react"><i class="far fa-smile-wink"></i> تفاعل</div>
                <div class="context-menu-item" data-action="reply"><i class="fas fa-reply"></i> رد</div>
                <div class="context-menu-item" data-action="mute"><i class="fas fa-microphone-slash"></i> كتم</div>
                <div class="context-menu-item danger" data-action="block"><i class="fas fa-ban"></i> حظر</div>
            `;

            document.body.appendChild(menu);

            const rect = menu.getBoundingClientRect();
            if (rect.right > window.innerWidth) menu.style.left = `${window.innerWidth - rect.width - 10}px`;
            if (rect.bottom > window.innerHeight) menu.style.top = `${window.innerHeight - rect.height - 10}px`;

            menu.querySelectorAll("[data-action]").forEach(item => {
                item.addEventListener("click", async () => {
                    const action = item.getAttribute("data-action");
                    menu.remove();
                    switch (action) {
                        case "pin": await pinMessage(msg.message_id); break;
                        case "delete": await deleteMessage(msg.message_id); break;
                        case "react": openReactionPicker(msg.message_id); break;
                        case "reply": setReply(msg); break;
                        case "mute": await muteUser(); break;
                        case "block": await blockUser(); break;
                    }
                });
            });

            setTimeout(() => {
                document.addEventListener("click", function closeMenu(e) {
                    if (!menu.contains(e.target)) {
                        menu.remove();
                        document.removeEventListener("click", closeMenu);
                    }
                });
            }, 10);
        }

        async function pinMessage(msgId) {
            try {
                await apiCall("/pin_message", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ token: currentToken, chat_id: currentChatId, message_id: msgId })
                });
                alert("✅ تم تثبيت الرسالة");
            } catch (error) {
                alert("⚠️ غير مدعوم في الخادم");
            }
        }

        async function deleteMessage(msgId) {
            try {
                await apiCall("/delete_message", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ token: currentToken, chat_id: currentChatId, message_id: msgId })
                });
                alert("✅ تم حذف الرسالة");
            } catch (error) {
                alert("⚠️ غير مدعوم");
            }
        }

        async function muteUser() {
            const uid = prompt("أدخل معرف المستخدم (ID) للكتم:");
            if (!uid) return;
            try {
                await apiCall("/restrict_user", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ token: currentToken, chat_id: currentChatId, user_id: parseInt(uid), until_date: 2147483647 })
                });
                alert("✅ تم كتم المستخدم");
            } catch (error) {
                alert("⚠️ غير مدعوم");
            }
        }

        async function blockUser() {
            const uid = prompt("أدخل معرف المستخدم (ID) للحظر:");
            if (!uid) return;
            try {
                await apiCall("/ban_user", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ token: currentToken, chat_id: currentChatId, user_id: parseInt(uid) })
                });
                alert("✅ تم حظر المستخدم");
            } catch (error) {
                alert("⚠️ غير مدعوم");
            }
        }

        // ================== Reply ==================
        function setReply(msg) {
            currentReplyTo = msg;
            updateReplyPreview();
        }

        function updateReplyPreview() {
            const container = document.getElementById("replyPreviewContainer");
            if (!container) return;

            if (currentReplyTo) {
                const previewHtml = `
                    <div class="reply-preview">
                        <div class="reply-content">
                            <strong>↩️ رد على ${currentReplyTo.sender_name}:</strong>
                            <span>${currentReplyTo.text?.substring(0, 60) || ""}</span>
                        </div>
                        <div class="cancel-reply-btn" onclick="resetReplyPreview()">إلغاء</div>
                    </div>
                `;
                container.innerHTML = previewHtml;
            } else {
                container.innerHTML = "";
            }
        }

        function resetReplyPreview() {
            currentReplyTo = null;
            updateReplyPreview();
        }

        // ================== Send Message & Media ==================
        async function sendMessage() {
            const input = document.getElementById("msgInput");
            const text = input.value.trim();
            if (!text) return;

            let payload = { token: currentToken, chat_id: currentChatId, text: text };
            if (currentReplyTo) {
                payload.reply_to_message_id = currentReplyTo.message_id;
            }

            try {
                await apiCall("/send_message", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(payload)
                });
                input.value = "";
                resetReplyPreview();

                const container = document.getElementById("messages");
                const tempDiv = document.createElement("div");
                tempDiv.className = "msg user";
                tempDiv.innerHTML = `<div class="sender"><span>أنت</span></div>${text}`;
                container.appendChild(tempDiv);
                container.scrollTop = container.scrollHeight;
            } catch (error) {
                alert("⚠️ فشل إرسال الرسالة");
            }
        }

        async function uploadMedia() {
            const fileInput = document.getElementById("mediaFile");
            const file = fileInput.files[0];
            if (!file) return;

            const formData = new FormData();
            formData.append("token", currentToken);
            formData.append("chat_id", currentChatId);

            let endpoint = "/send_document";
            if (file.type.startsWith("image/")) endpoint = "/send_photo";
            else if (file.type.startsWith("video/")) endpoint = "/send_video";

            const fileField = endpoint === "/send_photo" ? "photo" : (endpoint === "/send_video" ? "video" : "document");
            formData.append(fileField, file);

            try {
                await fetch(`${API_BASE}${endpoint}`, { method: "POST", body: formData });
                fileInput.value = "";
            } catch (error) {
                alert("⚠️ فشل رفع الملف");
            }
        }

        // ================== Reactions ==================
        function openReactionPicker(msgId) {
            selectedMessageId = msgId;
            const grid = document.getElementById("reactionsGrid");
            grid.innerHTML = REACTIONS.map(e => `<div class="reaction-emoji" onclick="sendReaction('${e}')">${e}</div>`).join("");
            document.getElementById("reactionsModal").style.display = "flex";
        }

        function closeReactionModal() {
            document.getElementById("reactionsModal").style.display = "none";
        }

        async function sendReaction(emoji) {
            if (!selectedMessageId) return;
            try {
                await apiCall("/send_reaction", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        token: currentToken,
                        chat_id: currentChatId,
                        message_id: parseInt(selectedMessageId),
                        emoji: emoji
                    })
                });
                closeReactionModal();
            } catch (error) {
                alert("⚠️ فشل إرسال التفاعل");
            }
        }

        // ================== WebSocket ==================
        function connectWebSocket() {
            if (ws) ws.close();
            const wsProtocol = API_BASE.startsWith("https") ? "wss" : "ws";
            const wsUrl = `${wsProtocol}://${API_BASE.replace(/^https?:\/\//, "")}/ws/${currentToken}/${currentChatId}`;
            ws = new WebSocket(wsUrl);
            ws.onmessage = (e) => {
                const data = JSON.parse(e.data);
                if (data.type === "new_message") {
                    const container = document.getElementById("messages");
                    if (container) {
                        container.appendChild(createMessageElement(data.message));
                        container.scrollTop = container.scrollHeight;
                    }
                }
            };
            ws.onclose = () => setTimeout(connectWebSocket, 3000);
        }

        // ================== Chat Management ==================
        function closeCurrentChat() {
            if (ws) ws.close();
            currentChatId = null;
            document.getElementById("chatArea").style.display = "none";
            document.getElementById("chatListPanel").style.display = "flex";
            document.getElementById("globalBackBtn").style.display = "none";
            loadChats();
        }

        async function joinChatById() {
            const chatId = document.getElementById("searchChatInput").value.trim();
            if (!chatId || !currentToken) return;
            try {
                await apiCall("/join_chat", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ token: currentToken, chat_id: chatId })
                });
                loadChats();
            } catch (error) {
                alert("⚠️ فشل الانضمام إلى الدردشة");
            }
        }

        // ================== Bot Settings ==================
        async function openChatSettings() {
            try {
                const data = await apiCall("/get_bots");
                const bot = data.bots.find(b => b.token === currentToken) || {};
                const content = `
                    <h3>⚙️ إعدادات ${bot.name || bot.username}</h3>
                    <div style="margin: 15px 0;">
                        <label>الاسم:</label>
                        <input type="text" id="newBotName" value="${bot.name || ''}" style="width:100%; margin-top:5px;">
                    </div>
                    <button onclick="setBotName()">تحديث الاسم</button>
                    <div style="margin: 15px 0;">
                        <label>الوصف:</label>
                        <input type="text" id="newBotDesc" style="width:100%; margin-top:5px;">
                    </div>
                    <button onclick="setBotDesc()">تحديث الوصف</button>
                    <div style="margin: 15px 0;">
                        <label>صورة جديدة:</label>
                        <input type="file" id="newBotPhoto" accept="image/*">
                    </div>
                    <button onclick="setBotPhoto()">رفع الصورة</button>
                    <hr style="margin: 20px 0;">
                    <button onclick="logoutBot()" style="background:#333; border:1px solid var(--primary); width:100%;">
                        🚪 تسجيل الخروج (حذف البوت من هذه اللوحة فقط، لا يحذف من تلغرام)
                    </button>
                    <button onclick="closeSettingsModal()" style="background:#333; width:100%; margin-top:15px;">إغلاق</button>
                `;
                document.getElementById("settingsContent").innerHTML = content;
                document.getElementById("settingsModal").style.display = "flex";
            } catch (error) {
                console.error("Failed to open settings", error);
            }
        }

        async function setBotName() {
            const name = document.getElementById("newBotName").value;
            try {
                await apiCall("/set_bot_name", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ token: currentToken, name })
                });
                alert("تم تحديث الاسم");
            } catch (error) {
                alert("فشل تحديث الاسم");
            }
        }

        async function setBotDesc() {
            const desc = document.getElementById("newBotDesc").value;
            try {
                await apiCall("/set_bot_description", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ token: currentToken, description: desc })
                });
                alert("تم تحديث الوصف");
            } catch (error) {
                alert("فشل تحديث الوصف");
            }
        }

        async function setBotPhoto() {
            const file = document.getElementById("newBotPhoto").files[0];
            if (!file) return;
            const formData = new FormData();
            formData.append("token", currentToken);
            formData.append("photo", file);
            try {
                await fetch(`${API_BASE}/set_bot_photo`, { method: "POST", body: formData });
                alert("تم تحديث الصورة");
                loadBots();
            } catch (error) {
                alert("فشل رفع الصورة");
            }
        }

        async function logoutBot() {
            if (!confirm("⚠️ تسجيل الخروج سيحذف البوت من هذه اللوحة فقط. البوت يبقى موجوداً في تلغرام. متأكد؟")) return;
            try {
                await apiCall("/delete_bot", {
                    method: "DELETE",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ token: currentToken })
                });
                alert("تم تسجيل الخروج من البوت");
                closeSettingsModal();
                if (ws) ws.close();
                currentToken = null;
                currentChatId = null;
                document.getElementById("chatArea").style.display = "none";
                document.getElementById("chatListPanel").style.display = "flex";
                document.getElementById("globalBackBtn").style.display = "none";
                loadBots();
            } catch (error) {
                alert("فشل تسجيل الخروج");
            }
        }

        function closeSettingsModal() {
            document.getElementById("settingsModal").style.display = "none";
        }

        // ================== Periodic Refresh ==================
        setInterval(() => {
            if (currentChatId && document.getElementById("chatArea").style.display === "flex") {
                apiCall(`/get_messages/${currentChatId}?token=${currentToken}&limit=50`)
                    .then(data => renderMessages(data.messages))
                    .catch(console.error);
            }
        }, 8000);
    </script>
</body>
</html>
